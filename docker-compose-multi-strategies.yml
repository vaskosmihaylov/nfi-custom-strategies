      --strategy-path user_data/strategies/e0v1e
      --strategy E0V1E_Shorts

  # E0V1E Binance-tuned Strategy (isolated variant)
  freqtrade-e0v1e_binance:
    <<: *common-settings
    container_name: freqtrade-e0v1e_binance
    ports:
      - "127.0.0.1:8114:8080"
