      --strategy-path user_data/strategies/e0v1e
      --strategy E0V1E

  # E0V1E_Shorts Strategy (Shorts-only parallel test)
  freqtrade-e0v1e_shorts:
    <<: *common-settings
    container_name: freqtrade-e0v1e_shorts
