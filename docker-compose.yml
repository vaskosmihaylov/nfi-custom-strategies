---

x-common-settings:
  &common-settings
  image: freqtradeorg/freqtrade:stable
  build:
    context: .
    dockerfile: "./docker/Dockerfile.custom"
  restart: unless-stopped
  volumes:
    - "./user_data:/freqtrade/user_data"
    - "./user_data/data:/freqtrade/user_data/data"
    - "./configs:/freqtrade/configs"
    - "./${FREQTRADE__STRATEGY:-NostalgiaForInfinityX7}.py:/freqtrade/${FREQTRADE__STRATEGY:-NostalgiaForInfinityX7}.py"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}"]
    interval: 1m30s
    timeout: 10s
    retries: 3
    start_period: 40s
    start_interval: 5s
  env_file:
    - path: ./env-files/nfi.env
      required: false # default true

services:
  nfi-updater:
    build:
      context: .
      dockerfile: docker/Dockerfile.updater
    container_name: nfi-updater
    restart: unless-stopped
    volumes:
      # Project root — updater reads/writes strategy + config files here
      - .:/data
      # Docker socket — allows the updater to restart the freqtrade container
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Timezone for the daily cron schedule (e.g. Europe/London, America/New_York)
      - TZ=${TZ:-UTC}
      # Must match your freqtrade env vars so the updater knows which files to fetch
      - STRATEGY=${FREQTRADE__STRATEGY:-NostalgiaForInfinityX7}
      - EXCHANGE=${FREQTRADE__EXCHANGE__NAME:-binance}
      # Cron schedule for the daily update check (default: 10:00 AM in the TZ above)
      - NFI_UPDATE_CRON=${NFI_UPDATE_CRON:-0 10 * * *}
      # Docker Compose project name — must match what 'docker compose ls' shows for your stack.
      # Docker uses the lowercase folder name by default (e.g. nostalgiaforinfinity).
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-nostalgiaforinfinity}
    env_file:
      - path: .env
        required: false
    depends_on:
      - freqtrade

  freqtrade:
    <<: *common-settings
    container_name: ${FREQTRADE__BOT_NAME:-Example_Test_Account}_${FREQTRADE__EXCHANGE__NAME:-binance}_${FREQTRADE__TRADING_MODE:-futures}-${FREQTRADE__STRATEGY:-NostalgiaForInfinityX7}
    ports:
      - "${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}:${FREQTRADE__API_SERVER__LISTEN_PORT:-8080}"
    # Default command used when running `docker compose up`
    command: >
      trade
      --config user_data/strategies/config.json
      --db-url sqlite:////freqtrade/user_data/${FREQTRADE__BOT_NAME:-Example_Test_Account}_${FREQTRADE__EXCHANGE__NAME:-binance}_${FREQTRADE__TRADING_MODE:-futures}-tradesv3.sqlite
      --log-file user_data/logs/${FREQTRADE__BOT_NAME:-Example_Test_Account}-${FREQTRADE__EXCHANGE__NAME:-binance}-${FREQTRADE__STRATEGY:-NostalgiaForInfinityX7}-${FREQTRADE__TRADING_MODE:-futures}.log
      --strategy-path .
      -v
