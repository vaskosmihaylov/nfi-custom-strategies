---
# Dedicated Docker Compose stack for Donchian_ADX_CHOPStrategy.
# This replaces the former NNPredict slot while preserving port 8138.

services:
  freqtrade-donchian_adx_chop:
    image: freqtradeorg/freqtrade:stable
    build:
      context: .
      dockerfile: "./docker/Dockerfile.custom"
    container_name: freqtrade-donchian_adx_chop
    restart: unless-stopped
    ports:
      - "127.0.0.1:8138:8080"
    env_file:
      - path: ./env-files/donchian_adx_chop.env
        required: true
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "./user_data/data:/freqtrade/user_data/data"
      - "./configs:/freqtrade/configs"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    command: >
      trade
      --config user_data/strategies/config.json
      --db-url sqlite:////freqtrade/user_data/donchian_adx_chop-tradesv3.sqlite
      --log-file user_data/logs/donchian_adx_chop.log
      --strategy-path user_data/strategies/Donchian_ADX_CHOPStrategy
      --strategy Donchian_ADX_CHOPStrategy

networks:
  default:
    name: freqtrade-network
