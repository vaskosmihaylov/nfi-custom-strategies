---
# Dedicated Docker Compose stack for NNPredict.
# Keeps TensorFlow/Keras dependencies isolated from the main multi-strategy image.

services:
  freqtrade-nnpredict:
    image: freqtradeorg/freqtrade:nnpredict
    build:
      context: .
      dockerfile: "./docker/Dockerfile.nnpredict"
    container_name: freqtrade-nnpredict
    restart: unless-stopped
    ports:
      - "127.0.0.1:8138:8080"
    env_file:
      - path: ./env-files/nnpredict.env
        required: true
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "./user_data/data:/freqtrade/user_data/data"
      - "./configs:/freqtrade/configs"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    command: >
      trade
      --config user_data/strategies/config.json
      --db-url sqlite:////freqtrade/user_data/nnpredict-tradesv3.sqlite
      --log-file user_data/logs/nnpredict.log
      --strategy-path user_data/strategies/**NNPredict
      --strategy NNPredict

networks:
  default:
    name: freqtrade-network
