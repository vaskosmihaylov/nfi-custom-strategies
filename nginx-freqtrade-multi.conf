# NGINX Configuration for Multi-Strategy Freqtrade - CORRECTED
# This fixes the double-path issue by using simple base paths

# WebSocket upgrade mapping (required for FreqUI)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;

    server_name freq.gaiaderma.com;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # CORS headers for cross-origin requests
    add_header Access-Control-Allow-Origin "freq.gaiaderma.com";
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range";

    # Main FreqUI location - Default to NFI-X7 strategy
    location / {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # Strategy-specific paths (FreqUI will append /api/v1/* to these)

    # NFI-X7 Strategy - Base path /nfi-x7
    location /nfi-x7/ {
        proxy_pass http://127.0.0.1:8080/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # E0V1E Strategy - Base path /e0v1e
    location /e0v1e/ {
        proxy_pass http://127.0.0.1:8098/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # E0V1E_Shorts Strategy - Base path /e0v1e_shorts
    location /e0v1e_shorts/ {
        proxy_pass http://127.0.0.1:8099/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # E0V1E Binance-tuned Strategy - Base path /e0v1e_binance
    location /e0v1e_binance/ {
        proxy_pass http://127.0.0.1:8114/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # BinHV27 Combined Strategy - Base path /binhv27
    location /binhv27/ {
        proxy_pass http://127.0.0.1:8092/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # Auto_EI_t4c0s Strategy (Longs) - Base path /auto_ei_t4c0s
    location /auto_ei_t4c0s/ {
        proxy_pass http://127.0.0.1:8100/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # ETCG_Shorts Strategy - Base path /etcg_shorts
    location /etcg_shorts/ {
        proxy_pass http://127.0.0.1:8103/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # KamaFama Strategy (Longs) - Base path /kamafama
    location /kamafama/ {
        proxy_pass http://127.0.0.1:8091/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # ZaratustraDCA2_06 Strategy (Longs + Shorts) - Base path /zaratustra
    location /zaratustra/ {
        proxy_pass http://127.0.0.1:8119/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # BollingerBounce Strategy (Longs) - Base path /bollingerbounce
    location /bollingerbounce/ {
        proxy_pass http://127.0.0.1:8124/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # BollingerBounce_Shorts Strategy (Shorts) - Base path /bollingerbounce_shorts
    location /bollingerbounce_shorts/ {
        proxy_pass http://127.0.0.1:8125/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # KeltnerBounce Strategy (Longs) - Base path /keltnerbounce
    location /keltnerbounce/ {
        proxy_pass http://127.0.0.1:8126/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # KeltnerBounce_Shorts Strategy (Shorts) - Base path /keltnerbounce_shorts
    location /keltnerbounce_shorts/ {
        proxy_pass http://127.0.0.1:8127/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # UltraSmartStrategy_NoStoploss_v2 Strategy (Longs) - Base path /ultrasmart_nostop_v2
    location /ultrasmart_nostop_v2/ {
        proxy_pass http://127.0.0.1:8128/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # Lmao Strategy (Longs) - Base path /lmao
    location /lmao/ {
        proxy_pass http://127.0.0.1:8129/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # MtfScalper Strategy - Base path /mtfscalper
    location /mtfscalper/ {
        proxy_pass http://127.0.0.1:8131/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # AlexBandSniperV10AI Strategy - Base path /alexbandsniper_v10ai
    location /alexbandsniper_v10ai/ {
        proxy_pass http://127.0.0.1:8132/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # TripleSuperTrendADXRSI Strategy (Longs + Shorts) - Base path /triplesupertrendadxrsi
    location /triplesupertrendadxrsi/ {
        proxy_pass http://127.0.0.1:8134/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # ORBAlgo Strategy (Longs + Shorts) - Base path /orbalgo
    location /orbalgo/ {
        proxy_pass http://127.0.0.1:8135/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # IchimokuCloudBreakoutStrategy (Longs + Shorts) - Base path /ichiv1_plus
    location /ichiv1_plus/ {
        proxy_pass http://127.0.0.1:8136/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # Picasso CE/CTI/STC/EMA Strategy (Longs + Shorts) - Base path /picasso_ce
    location /picasso_ce/ {
        proxy_pass http://127.0.0.1:8137/;
        include /etc/nginx/conf.d/freqtrade-proxy-headers.conf;
    }

    # Health check endpoints
    location /health/nfi-x7 {
        access_log off;
        proxy_pass http://127.0.0.1:8080/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/e0v1e {
        access_log off;
        proxy_pass http://127.0.0.1:8098/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/e0v1e_shorts {
        access_log off;
        proxy_pass http://127.0.0.1:8099/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/e0v1e_binance {
        access_log off;
        proxy_pass http://127.0.0.1:8114/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/binhv27 {
        access_log off;
        proxy_pass http://127.0.0.1:8092/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/auto_ei_t4c0s {
        access_log off;
        proxy_pass http://127.0.0.1:8100/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/etcg {
        access_log off;
        proxy_pass http://127.0.0.1:8102/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/etcg_shorts {
        access_log off;
        proxy_pass http://127.0.0.1:8103/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/kamafama {
        access_log off;
        proxy_pass http://127.0.0.1:8091/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/zaratustra {
        access_log off;
        proxy_pass http://127.0.0.1:8119/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/bollingerbounce {
        access_log off;
        proxy_pass http://127.0.0.1:8124/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/bollingerbounce_shorts {
        access_log off;
        proxy_pass http://127.0.0.1:8125/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/keltnerbounce {
        access_log off;
        proxy_pass http://127.0.0.1:8126/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/keltnerbounce_shorts {
        access_log off;
        proxy_pass http://127.0.0.1:8127/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/ultrasmart_nostop_v2 {
        access_log off;
        proxy_pass http://127.0.0.1:8128/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/lmao {
        access_log off;
        proxy_pass http://127.0.0.1:8129/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/mtfscalper {
        access_log off;
        proxy_pass http://127.0.0.1:8131/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/alexbandsniper_v10ai {
        access_log off;
        proxy_pass http://127.0.0.1:8132/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/triplesupertrendadxrsi {
        access_log off;
        proxy_pass http://127.0.0.1:8134/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/orbalgo {
        access_log off;
        proxy_pass http://127.0.0.1:8135/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/ichiv1_plus {
        access_log off;
        proxy_pass http://127.0.0.1:8136/api/v1/ping;
        proxy_set_header Host $host;
    }

    location /health/picasso_ce {
        access_log off;
        proxy_pass http://127.0.0.1:8137/api/v1/ping;
        proxy_set_header Host $host;
    }

    # Security: Block access to sensitive files
    location ~ /\.(ht|env|git) {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/freqtrade_access.log;
    error_log /var/log/nginx/freqtrade_error.log;
}
