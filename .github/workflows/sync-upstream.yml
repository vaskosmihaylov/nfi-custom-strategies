name: Sync Fork from Upstream

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing changes

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper merge
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/iterativv/NostalgiaForInfinity.git || true
          git fetch upstream

      - name: Merge upstream changes
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Merging from upstream/main..."

          # Merge upstream changes
          git merge upstream/main --no-edit || {
            echo "Merge conflict detected, attempting auto-resolution..."

            # If there are conflicts, prefer upstream version for NFI files
            # but keep our custom directories
            git status --porcelain | grep '^UU' || exit 0

            # For any conflicts in root-level .py files, take upstream version
            for file in $(git diff --name-only --diff-filter=U); do
              if [[ "$file" == NostalgiaForInfinity*.py ]]; then
                echo "Auto-resolving $file - taking upstream version"
                git checkout --theirs "$file"
                git add "$file"
              fi
            done

            # Try to complete merge
            git commit --no-edit || {
              echo "❌ Merge conflicts could not be auto-resolved"
              echo "Manual intervention required!"
              exit 1
            }
          }

      - name: Validate push token
        env:
          SYNC_UPSTREAM_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          if [ -z "$SYNC_UPSTREAM_TOKEN" ]; then
            echo "SYNC_UPSTREAM_TOKEN is not configured."
            echo "Create a fine-grained PAT with Contents: Read and write and Workflows: Read and write,"
            echo "or a classic PAT with repo and workflow scopes, then store it as the SYNC_UPSTREAM_TOKEN repository secret."
            exit 1
          fi

      - name: Push to fork
        env:
          SYNC_UPSTREAM_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${SYNC_UPSTREAM_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main

          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "origin/main changed while the workflow was running. Merging latest fork changes before push..."
            git merge --no-edit origin/main || {
              echo "❌ Could not merge the latest origin/main into the sync branch"
              echo "Manual intervention required!"
              exit 1
            }
          fi

          git push origin HEAD:main || {
            echo "Push was rejected after the initial refresh. Fetching origin/main and retrying once..."
            git fetch origin main
            git merge --no-edit origin/main || {
              echo "❌ Could not merge the latest origin/main during push retry"
              echo "Manual intervention required!"
              exit 1
            }
            git push origin HEAD:main
          }

      - name: Summary
        run: |
          echo "✅ Sync completed successfully"
          echo "Latest commit: $(git log -1 --oneline)"

          # Check for NFI version
          if [ -f "NostalgiaForInfinityX7.py" ]; then
            VERSION=$(grep 'return "v' NostalgiaForInfinityX7.py | head -1 | sed 's/.*return "\(v[^"]*\)".*/\1/' 2>/dev/null || echo "unknown")
            echo "NFI X7 version: $VERSION"
          fi
